<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OmniFit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <main class="max-w-md mx-auto min-h-screen px-6 pt-safe-top pb-32">
        <header class="py-6 flex justify-between items-center">
            <h1 class="text-3xl font-black text-indigo-600 dark:text-indigo-400 font-jakarta">OmniFit</h1>
            <button id="themeToggle" class="p-2 rounded-full bg-white dark:bg-slate-800 shadow-sm">🌙</button>
        </header>

        <div id="resultArea" class="hidden mb-6">
            <div class="glass-card-accent p-4 rounded-2xl flex justify-between items-center">
                <span class="font-bold opacity-70 text-sm">今日目標</span>
                <span class="text-xl font-black"><span id="tdeeVal">0</span> kcal</span>
            </div>
        </div>

        <section class="glass-card p-6 rounded-3xl mb-6">
            <h2 class="text-xl font-bold mb-4 flex items-center">🍱 我的餐單</h2>
            
            <div class="relative mb-4">
                <input type="text" id="foodSearch" placeholder="搜尋食物 (如: 雞肉)" class="input-field pr-12">
                <div id="searchDropdown" class="absolute left-0 right-0 mt-2 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl shadow-xl z-50 hidden max-h-48 overflow-y-auto"></div>
            </div>

            <div id="mealList" class="space-y-3 mb-6">
                </div>

            <div class="pt-4 border-t dark:border-slate-700">
                <div class="flex justify-between text-sm font-bold">
                    <span>餐單總計:</span>
                    <span id="mealTotalKcal" class="text-indigo-600">0 kcal</span>
                </div>
            </div>
        </section>

        <details class="opacity-50">
            <summary class="text-sm font-bold cursor-pointer">修改身體數據</summary>
            <div class="mt-4 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="age" placeholder="年齡" class="input-field text-sm">
                    <select id="gender" class="input-field text-sm"><option value="male">男</option><option value="female">女</option></select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="height" placeholder="身高" class="input-field text-sm">
                    <input type="number" id="weight" placeholder="體重" class="input-field text-sm">
                </div>
                <select id="activity" class="input-field text-sm">
                    <option value="1.2">久坐</option><option value="1.55">中度運動</option>
                </select>
                <button id="saveBtn" class="w-full py-2 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold text-xs">更新 TDEE</button>
            </div>
        </details>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
