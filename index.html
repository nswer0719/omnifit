<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OmniFit</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <main class="max-w-md mx-auto min-h-screen px-6 pt-safe-top pb-32">
        <header class="py-8 flex justify-between items-center">
            <h1 class="text-4xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">OmniFit</h1>
            <button id="themeToggle" class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 shadow-sm flex items-center justify-center text-xl">🌙</button>
        </header>

        <div id="resultArea" class="hidden space-y-4 mb-8">
            <div class="glass-card-accent p-8 rounded-[2rem] text-center relative overflow-hidden">
                <p class="text-xs font-bold uppercase tracking-widest opacity-60 mb-1">Daily Target</p>
                <div class="text-6xl font-black tracking-tighter text-indigo-600 dark:text-indigo-300">
                    <span id="tdeeVal">0</span><span class="text-xl ml-1">kcal</span>
                </div>
                <div class="mt-4 py-2 px-4 bg-white/40 dark:bg-slate-900/40 rounded-full inline-flex items-center gap-2">
                    <span class="text-xs font-bold">Goal: <span id="targetWVal">0</span>kg</span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="glass-card p-4 rounded-2xl text-center border-b-4 border-blue-500">
                    <p class="text-[10px] font-bold opacity-50">PRO</p>
                    <p class="font-black text-blue-600"><span id="totalPro">0</span>g</p>
                </div>
                <div class="glass-card p-4 rounded-2xl text-center border-b-4 border-amber-500">
                    <p class="text-[10px] font-bold opacity-50">FAT</p>
                    <p class="font-black text-amber-600"><span id="totalFat">0</span>g</p>
                </div>
                <div class="glass-card p-4 rounded-2xl text-center border-b-4 border-emerald-500">
                    <p class="text-[10px] font-bold opacity-50">CARB</p>
                    <p class="font-black text-emerald-600"><span id="totalCarb">0</span>g</p>
                </div>
            </div>
        </div>

        <section class="glass-card p-6 rounded-[2rem] mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold tracking-tight">🍱 Meals</h2>
                <span id="mealTotalKcal" class="text-sm font-black bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-xs">0 kcal</span>
            </div>
            
            <div class="relative mb-4">
                <input type="text" id="foodSearch" placeholder="Search food..." class="input-field rounded-2xl">
                <div id="searchDropdown" class="absolute left-0 right-0 mt-2 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl shadow-2xl z-50 hidden max-h-60 overflow-y-auto"></div>
            </div>

            <div id="mealList" class="space-y-3">
                </div>
        </section>

        <details class="group">
            <summary class="list-none text-center opacity-30 group-open:opacity-100 transition-opacity">
                <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-6"></div>
            </summary>
            <div class="glass-card p-6 rounded-[2rem] space-y-4 mb-10">
                <h3 class="font-bold text-sm text-center uppercase tracking-widest opacity-50">Settings</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold opacity-40 ml-2">Current Weight</label>
                        <input type="number" id="weight" class="input-field" placeholder="kg">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold opacity-40 ml-2 text-indigo-500">Target Weight</label>
                        <input type="number" id="targetW" class="input-field border-indigo-200" placeholder="kg">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="height" placeholder="Height" class="input-field">
                    <input type="number" id="age" placeholder="Age" class="input-field">
                </div>
                <select id="gender" class="input-field">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <select id="activity" class="input-field">
                    <option value="1.2">Sedentary</option>
                    <option value="1.55">Moderate</option>
                    <option value="1.725">Active</option>
                </select>
                <button id="saveBtn" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-200 dark:shadow-none active:scale-95 transition-all">UPDATE DATA</button>
            </div>
        </details>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
