<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OmniFit</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <main class="max-w-md mx-auto min-h-screen px-6 pt-safe-top pb-32">
        <header class="py-8 flex justify-between items-center">
            <h1 class="text-4xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">OmniFit</h1>
            <button id="themeToggle" class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 shadow-sm flex items-center justify-center text-xl">🌙</button>
        </header>

        <div id="resultArea" class="hidden space-y-4 mb-8">
            <div class="glass-card-accent p-8 rounded-[2.5rem] relative overflow-hidden">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-white/60">Target Weight</p>
                        <div class="text-4xl font-black text-white"><span id="targetWVal">0</span><span class="text-lg ml-1 opacity-60">kg</span></div>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold uppercase tracking-widest text-white/60">Daily Intake</p>
                        <div class="text-4xl font-black text-white"><span id="tdeeVal">0</span><span class="text-lg ml-1 opacity-60">kcal</span></div>
                    </div>
                </div>
                <div class="w-full h-2 bg-white/20 rounded-full overflow-hidden">
                    <div id="kcalProgress" class="h-full bg-white transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="glass-card p-4 rounded-2xl text-center border-b-4 border-blue-500">
                    <p class="text-[10px] font-bold opacity-50 mb-1">PRO (藍)</p>
                    <p class="font-black text-blue-600 dark:text-blue-400"><span id="totalPro">0</span>g</p>
                </div>
                <div class="glass-card p-4 rounded-2xl text-center border-b-4 border-amber-500">
                    <p class="text-[10px] font-bold opacity-50 mb-1">FAT (琥珀)</p>
                    <p class="font-black text-amber-600 dark:text-amber-400"><span id="totalFat">0</span>g</p>
                </div>
                <div class="glass-card p-4 rounded-2xl text-center border-b-4 border-emerald-500">
                    <p class="text-[10px] font-bold opacity-50 mb-1">CARB (翡翠)</p>
                    <p class="font-black text-emerald-600 dark:text-emerald-400"><span id="totalCarb">0</span>g</p>
                </div>
            </div>
        </div>

        <section class="glass-card p-6 rounded-[2.5rem] mb-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold tracking-tight">🍱 Meals</h2>
                <div class="text-right">
                    <span id="mealTotalKcal" class="text-sm font-black bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-4 py-1.5 rounded-full">0 kcal</span>
                </div>
            </div>
            
            <div class="relative mb-6">
                <input type="text" id="foodSearch" placeholder="Search for food..." class="input-field rounded-2xl">
                <div id="searchDropdown" class="absolute left-0 right-0 mt-2 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl shadow-2xl z-50 hidden max-h-60 overflow-y-auto"></div>
            </div>

            <div id="mealList" class="space-y-3">
                </div>
        </section>

        <details class="group">
            <summary class="list-none text-center opacity-30 group-open:opacity-100 transition-opacity cursor-pointer">
                <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-6"></div>
            </summary>
            <div class="glass-card p-6 rounded-[2.5rem] space-y-4 mb-10">
                <h3 class="font-bold text-xs text-center uppercase tracking-widest opacity-50 mb-2">User Body Stats</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold opacity-40 ml-2">Weight (kg)</label>
                        <input type="number" id="weight" class="input-field" placeholder="Current">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold opacity-40 ml-2 text-indigo-500">Goal Weight (kg)</label>
                        <input type="number" id="targetW" class="input-field border-indigo-200 dark:border-indigo-900" placeholder="Target">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="height" placeholder="Height (cm)" class="input-field">
                    <input type="number" id="age" placeholder="Age" class="input-field">
                </div>
                <select id="gender" class="input-field">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <select id="activity" class="input-field">
                    <option value="1.2">Sedentary (Office job)</option>
                    <option value="1.55">Moderate (Exercise 3-5 days)</option>
                    <option value="1.725">Active (Exercise 6-7 days)</option>
                </select>
                <button id="saveBtn" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-200 dark:shadow-none active:scale-95 transition-all">SAVE & UPDATE</button>
            </div>
        </details>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
