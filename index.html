<!DOCTYPE html>
<html lang="zh-TW" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OmniFit</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <header class="fixed top-0 w-full max-w-md mx-auto z-40 px-6 pt-safe-top py-4 bg-white/70 dark:bg-slate-950/70 backdrop-blur-2xl border-b border-slate-200/50 dark:border-slate-800/50 flex justify-between items-center">
        <h1 class="text-3xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-500">OmniFit</h1>
    </header>

    <main class="max-w-md mx-auto min-h-screen px-6 pt-28 pb-32">
        
        <section id="tab-diet" class="tab-content active space-y-6 animate-fade-in">
            <div class="flex bg-slate-200/50 dark:bg-slate-800/50 p-1 rounded-2xl mb-4">
                <button onclick="window.switchSubTab('diet', 'today')" class="sub-tab-btn w-1/3 py-2 rounded-xl text-xs font-bold bg-white dark:bg-slate-700 shadow-sm transition-all" data-target="diet-today" data-i18n="today">Today</button>
                <button onclick="window.switchSubTab('diet', 'plan')" class="sub-tab-btn w-1/3 py-2 rounded-xl text-xs font-bold text-slate-500 transition-all" data-target="diet-plan" data-i18n="7dayPlan">7-Day</button>
                <button onclick="window.switchSubTab('diet', 'custom')" class="sub-tab-btn w-1/3 py-2 rounded-xl text-xs font-bold text-slate-500 transition-all" data-target="diet-custom" data-i18n="customFood">Custom</button>
            </div>

            <div id="diet-today" class="sub-tab-content block space-y-6">
                <div class="glass-card p-5 rounded-[2rem] flex justify-between items-center border-l-4 border-l-blue-400">
                    <div>
                        <p class="text-[10px] font-bold uppercase opacity-50" data-i18n="water">Water</p>
                        <p class="text-2xl font-black text-blue-500"><span id="waterTotal">0</span> <span class="text-sm">ml</span></p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.addWater(100)" class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 font-bold active:scale-90 transition">+1</button>
                        <button onclick="window.addWater(250)" class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 font-bold active:scale-90 transition">+2.5</button>
                    </div>
                </div>

                <div class="glass-card-accent p-6 rounded-[2rem] flex justify-between items-center text-white">
                    <div><p class="text-[10px] font-bold uppercase opacity-70" data-i18n="goal">Goal</p><p class="text-2xl font-black"><span id="dietGoalKcal">0</span> kcal</p></div>
                    <div class="text-right"><p class="text-[10px] font-bold uppercase opacity-70" data-i18n="current">Current</p><p class="text-2xl font-black"><span id="mealTotalKcal">0</span> kcal</p></div>
                </div>

                <div class="relative">
                    <input type="text" id="foodSearch" placeholder="Search food..." class="input-field rounded-2xl" data-i18n-ph="searchFood">
                    <div id="searchDropdown" class="absolute left-0 right-0 mt-2 bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl border border-slate-100 dark:border-slate-700 rounded-2xl shadow-2xl z-50 hidden max-h-60 overflow-y-auto"></div>
                </div>
                <div id="mealList" class="space-y-3"></div>
            </div>

            <div id="diet-plan" class="sub-tab-content hidden space-y-6">
                <div class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar" id="dateSelector"></div>
                <div id="planMealList" class="space-y-3"></div>
            </div>

            <div id="diet-custom" class="sub-tab-content hidden space-y-4">
                <div class="glass-card p-6 rounded-[2rem] space-y-4">
                    <input type="text" id="cFoodName" placeholder="Name" class="input-field">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="cFoodKcal" placeholder="Kcal/100g" class="input-field">
                        <input type="number" id="cFoodPro" placeholder="Protein (g)" class="input-field text-blue-500">
                        <input type="number" id="cFoodFat" placeholder="Fat (g)" class="input-field text-amber-500">
                        <input type="number" id="cFoodCarb" placeholder="Carbs (g)" class="input-field text-emerald-500">
                    </div>
                    <button onclick="window.saveCustomFood()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black active:scale-95 transition-all" data-i18n="save">Save</button>
                </div>
            </div>
        </section>

        <section id="tab-workout" class="tab-content hidden space-y-6 animate-fade-in">
            <div class="flex bg-slate-200/50 dark:bg-slate-800/50 p-1 rounded-2xl mb-4">
                <button onclick="window.switchSubTab('workout', 'today')" class="sub-tab-btn w-1/3 py-2 rounded-xl text-xs font-bold bg-white dark:bg-slate-700 shadow-sm transition-all" data-target="workout-today" data-i18n="today">Today</button>
                <button onclick="window.switchSubTab('workout', 'plan')" class="sub-tab-btn w-1/3 py-2 rounded-xl text-xs font-bold text-slate-500 transition-all" data-target="workout-plan" data-i18n="7dayPlan">7-Day</button>
                <button onclick="window.switchSubTab('workout', 'history')" class="sub-tab-btn w-1/3 py-2 rounded-xl text-xs font-bold text-slate-500 transition-all" data-target="workout-history" data-i18n="history">History</button>
            </div>

            <div id="workout-today" class="sub-tab-content block space-y-6">
                <div class="glass-card p-4 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">⏱️</span>
                        <div class="text-3xl font-black font-mono tracking-tighter" id="timerDisplay">00:00</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.startTimer(60)" class="px-3 py-1 bg-slate-200 dark:bg-slate-800 rounded-lg text-xs font-bold">+1m</button>
                        <button onclick="window.stopTimer()" class="px-3 py-1 bg-red-100 text-red-600 rounded-lg text-xs font-bold" data-i18n="stop">Stop</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="window.setWorkoutMode('cardio')" class="p-4 rounded-[1.5rem] bg-orange-100 text-orange-600 dark:bg-orange-900/30 font-bold border-2 border-orange-200" id="btnCardio" data-i18n="cardio">Cardio</button>
                    <button onclick="window.setWorkoutMode('strength')" class="p-4 rounded-[1.5rem] bg-slate-100 text-slate-400 dark:bg-slate-800 font-bold border-2 border-transparent" id="btnStrength" data-i18n="strength">Strength</button>
                </div>

                <div class="glass-card p-5 rounded-[2rem] space-y-4" id="workoutInputArea">
                    <input type="text" id="wName" placeholder="Exercise Name" class="input-field">
                    <div id="cardioInputs" class="grid grid-cols-2 gap-3">
                        <input type="number" id="wDist" placeholder="Distance (km)" class="input-field">
                        <input type="number" id="wTime" placeholder="Time (min)" class="input-field">
                    </div>
                    <div id="strengthInputs" class="grid grid-cols-3 gap-3 hidden">
                        <input type="number" id="wWeight" placeholder="kg" class="input-field">
                        <input type="number" id="wSets" placeholder="Sets" class="input-field">
                        <input type="number" id="wReps" placeholder="Reps" class="input-field">
                    </div>
                    <button onclick="window.logWorkout()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black active:scale-95 transition-all" data-i18n="add">Add</button>
                </div>
                <div id="todayWorkoutList" class="space-y-3"></div>
            </div>
            
            <div id="workout-plan" class="sub-tab-content hidden">
                <p class="text-center opacity-50 text-sm py-10" data-i18n="comingSoon">Feature ready for backend sync</p>
            </div>
            <div id="workout-history" class="sub-tab-content hidden">
                <div id="historyWorkoutList" class="space-y-3"></div>
            </div>
        </section>

        <section id="tab-social" class="tab-content hidden space-y-6 animate-fade-in">
            <div class="glass-card p-6 rounded-[2rem] text-center border-dashed border-2 border-indigo-200 cursor-pointer" onclick="document.getElementById('fileUpload').click()">
                <div class="text-4xl mb-2">📸</div><p class="font-bold text-sm text-indigo-600" data-i18n="uploadMedia">Upload Media</p>
                <input type="file" id="fileUpload" accept="image/*,video/*" class="hidden">
            </div>
            </section>

        <section id="tab-user" class="tab-content hidden space-y-6 animate-fade-in">
            <div class="glass-card-accent p-6 rounded-[2.5rem] text-white">
                <div class="flex justify-between items-end mb-4">
                    <div><p class="text-[10px] font-bold uppercase opacity-70">Target Calorie</p><p class="text-4xl font-black"><span id="userGoalCal">0</span></p></div>
                    <div class="text-right"><p class="text-[10px] font-bold uppercase opacity-70">TDEE / BMI</p><p class="text-xl font-bold"><span id="userTdee">0</span> / <span id="userBmi">0</span></p></div>
                </div>
                <p id="calorieAdvice" class="text-xs font-semibold bg-white/20 p-3 rounded-xl backdrop-blur-md"></p>
            </div>

            <div class="glass-card p-6 rounded-[2rem] space-y-4">
                <h3 class="font-black text-lg" data-i18n="bodyStats">Body Stats</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold opacity-40 ml-2">Weight (kg)</label><input type="number" id="setWeight" class="input-field"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-indigo-500 ml-2">Target (kg)</label><input type="number" id="setTargetW" class="input-field border-indigo-200"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="setHeight" placeholder="Height (cm)" class="input-field">
                    <input type="number" id="setAge" placeholder="Age" class="input-field">
                </div>
                <select id="setGender" class="input-field"><option value="male">Male</option><option value="female">Female</option></select>
                <select id="setActivity" class="input-field">
                    <option value="1.2" data-i18n="act1">Sedentary</option>
                    <option value="1.375" data-i18n="act2">Light Activity</option>
                    <option value="1.55" data-i18n="act3">Moderate</option>
                    <option value="1.725" data-i18n="act4">Active</option>
                    <option value="1.9" data-i18n="act5">Extra Active</option>
                </select>
                <button id="saveUserBtn" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-200 dark:shadow-none active:scale-95 transition-all" data-i18n="save">Save Data</button>
            </div>
        </section>

        <section id="tab-settings" class="tab-content hidden space-y-6 animate-fade-in">
            <h2 class="text-2xl font-black tracking-tight" data-i18n="settings">Settings</h2>
            <div class="glass-card p-6 rounded-[2rem] space-y-4">
                <div class="flex justify-between items-center p-3 border-b border-slate-100 dark:border-slate-800">
                    <span class="font-bold text-sm" data-i18n="language">Language</span>
                    <select id="langSelect" class="bg-transparent font-bold text-indigo-600 outline-none">
                        <option value="en">English</option>
                        <option value="zh">繁體中文</option>
                    </select>
                </div>
                <div class="flex justify-between items-center p-3 border-b border-slate-100 dark:border-slate-800">
                    <span class="font-bold text-sm" data-i18n="theme">Dark Mode</span>
                    <button id="toggleThemeBtn" class="w-12 h-6 bg-slate-200 dark:bg-indigo-500 rounded-full relative transition-colors"><div class="w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 dark:translate-x-6 transition-transform"></div></button>
                </div>
                <div class="flex justify-between items-center p-3">
                    <div class="flex items-center gap-2"><span class="text-xl">❤️</span><span class="font-bold text-sm" data-i18n="healthSync">Sync Health App</span></div>
                    <button id="toggleHealthBtn" class="w-12 h-6 bg-slate-200 rounded-full relative transition-colors"><div class="w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 transition-transform" id="healthKnob"></div></button>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full max-w-md mx-auto z-50 pb-safe-bottom bg-white/80 dark:bg-slate-950/80 backdrop-blur-2xl border-t border-slate-200/50 dark:border-slate-800/50">
        <div class="flex justify-around items-center p-4">
            <button onclick="window.switchTab('diet')" class="nav-btn active flex flex-col items-center gap-1 text-indigo-600" data-target="tab-diet">
                <span class="text-xl">🥗</span><span class="text-[10px] font-bold" data-i18n="navDiet">Diet</span>
            </button>
            <button onclick="window.switchTab('workout')" class="nav-btn flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition" data-target="tab-workout">
                <span class="text-xl">💪</span><span class="text-[10px] font-bold" data-i18n="navWorkout">Workout</span>
            </button>
            <button onclick="window.switchTab('social')" class="nav-btn flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition" data-target="tab-social">
                <span class="text-xl">🌐</span><span class="text-[10px] font-bold" data-i18n="navSocial">Social</span>
            </button>
            <button onclick="window.switchTab('user')" class="nav-btn flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition" data-target="tab-user">
                <span class="text-xl">👤</span><span class="text-[10px] font-bold" data-i18n="navUser">User</span>
            </button>
            <button onclick="window.switchTab('settings')" class="nav-btn flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition" data-target="tab-settings">
                <span class="text-xl">⚙️</span><span class="text-[10px] font-bold" data-i18n="navSettings">Settings</span>
            </button>
        </div>
    </nav>

    <script type="module" src="js/main.js"></script>
</body>
</html>
