<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OmniFit</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="safe-area-header"></header>

        <main id="app-content">
            <section id="tab-user" class="tab-content active">
                <h1 class="page-title">用戶數據系統</h1>
                
                <div class="card glass-effect">
                    <div class="form-group">
                        <label>性別</label>
                        <select id="gender">
                            <option value="male">男 (Male)</option>
                            <option value="female">女 (Female)</option>
                        </select>
                    </div>
                    <div class="grid-inputs">
                        <div class="form-group">
                            <label>年齡</label>
                            <input type="number" id="age" placeholder="25">
                        </div>
                        <div class="form-group">
                            <label>身高 (cm)</label>
                            <input type="number" id="height" placeholder="175">
                        </div>
                    </div>
                    <div class="grid-inputs">
                        <div class="form-group">
                            <label>目前體重 (kg)</label>
                            <input type="number" id="current-weight" placeholder="70">
                        </div>
                        <div class="form-group">
                            <label>目標體重 (kg)</label>
                            <input type="number" id="target-weight" placeholder="65">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>每週活動量 (詳細天數)</label>
                        <select id="activity-level">
                            <option value="1.2">久坐 (基本上不運動)</option>
                            <option value="1.375">輕度活動 (每週運動 1-2 天)</option>
                            <option value="1.55">中度活動 (每週運動 3-5 天)</option>
                            <option value="1.725">高度活動 (每週運動 6-7 天)</option>
                            <option value="1.9">極高活動 (運動員/高強度體力勞動)</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="calculateTDEE()">更新並計算</button>
                </div>

                <div class="result-container grid-inputs">
                    <div class="card result-card glass-effect">
                        <span class="label">維持現狀 TDEE</span>
                        <div class="value"><span id="tdee-current">0</span> <small>kcal</small></div>
                    </div>
                    <div class="card result-card target glass-effect">
                        <span class="label">目標體重 TDEE</span>
                        <div class="value"><span id="tdee-target">0</span> <small>kcal</small></div>
                    </div>
                </div>

                <div class="card glass-effect chart-section">
                    <h2 class="card-subtitle">最近 7 日體重趨勢</h2>
                    <div class="chart-wrapper">
                        <canvas id="weightChart"></canvas>
                    </div>
                </div>
            </section>

            <section id="tab-meals" class="tab-content">
                <h1 class="page-title">今日餐單</h1>
                
                <div class="card glass-effect dashboard-card">
                    <div class="dashboard-header">
                        <div class="dash-item">
                            <span class="label">目標 TDEE</span>
                            <div class="value target-text"><span id="dashboard-target-tdee">0</span> <small>kcal</small></div>
                        </div>
                        <div class="dash-item">
                            <span class="label">今日已攝取</span>
                            <div class="value accent-text"><span id="today-total-calories">0</span> <small>kcal</small></div>
                        </div>
                    </div>
                    <div class="macro-summary">
                        <div class="macro-item"><span class="label">蛋白質</span> <span id="total-protein">0</span>g</div>
                        <div class="macro-item"><span class="label">脂肪</span> <span id="total-fat">0</span>g</div>
                        <div class="macro-item"><span class="label">碳水</span> <span id="total-carbs">0</span>g</div>
                    </div>
                </div>

                <div class="card glass-effect">
                    <h2 class="card-subtitle">記錄新食物</h2>
                    <div class="form-group">
                        <label>食物名稱</label>
                        <input type="text" id="food-name" placeholder="例如：香煎雞胸肉">
                    </div>
                    <div class="grid-inputs">
                        <div class="form-group">
                            <label>餐別</label>
                            <select id="meal-type">
                                <option value="早餐">早餐</option>
                                <option value="午餐">午餐</option>
                                <option value="晚餐">晚餐</option>
                                <option value="小食/其他">小食/其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>卡路里 (kcal)</label>
                            <input type="number" id="food-calories" placeholder="0">
                        </div>
                    </div>
                    <div class="grid-inputs">
                        <div class="form-group">
                            <label>蛋白質 (g)</label>
                            <input type="number" id="food-protein" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>脂肪 (g)</label>
                            <input type="number" id="food-fat" placeholder="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>碳水化合物 (g)</label>
                        <input type="number" id="food-carbs" placeholder="0">
                    </div>
                    <button class="btn-primary" onclick="addFoodRecord()">新增紀錄</button>
                </div>

                <div class="card glass-effect">
                    <h2 class="card-subtitle">今日紀錄清單</h2>
                    <div id="food-list-container" class="food-list">
                        </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('tab-user', this)">
                <span class="icon">👤</span>
                <span class="nav-text">用戶</span>
            </div>
            <div class="nav-item" onclick="switchTab('tab-meals', this)">
                <span class="icon">🍽️</span>
                <span class="nav-text">餐單</span>
            </div>
        </nav>
    </div>

    <script src="js/tabs.js"></script>
    <script src="js/tdee.js"></script>
    <script src="js/meals.js"></script>
</body>
</html>
